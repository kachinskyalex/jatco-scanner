name: Android Build

on:
push:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - run: sudo apt-get update

  - run: |
      sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

  - run: |
      pip install --upgrade pip
      pip install buildozer Cython==0.29.33 flet

  - run: |
      buildozer init || true
      yes | buildozer android debug
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

  - uses: actions/upload-artifact@v4
    with:
      name: apk
      path: bin/*.apk
```
