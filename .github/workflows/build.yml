name: Build APK

on: [push, workflow_dispatch]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install system dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        git zip unzip openjdk-17-jdk python3-pip \
        autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo5 \
        cmake libffi-dev libssl-dev

  - name: Install Python dependencies
    run: |
      pip install --upgrade pip
      pip install buildozer Cython==0.29.33 flet

  - name: Build APK
    run: |
      buildozer init || true

      sed -i 's/^requirements = .*/requirements = python3,flet==0.21.2/' buildozer.spec
      sed -i 's/^# android.permissions = .*/android.permissions = CAMERA,INTERNET/' buildozer.spec
      sed -i 's/^# android.api = .*/android.api = 33/' buildozer.spec
      sed -i 's/^# android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec

      yes | buildozer android debug
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: android-apk
      path: bin/*.apk
```
